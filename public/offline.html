<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mất kết nối - LIMS Cloud</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #334155;
            display: flex;
            align-items: center;
            justify-center: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            padding: 2rem;
            max-width: 400px;
            margin: 0 auto;
        }
        .icon {
            font-size: 4rem;
            color: #94a3b8;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #0f172a;
        }
        p {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 2rem;
            color: #64748b;
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>Mất kết nối mạng</h1>
        <p>Ứng dụng không thể kết nối tới máy chủ. Vui lòng kiểm tra lại kết nối Wi-Fi hoặc 3G/4G của bạn.</p>
        <button onclick="window.location.reload()">Thử lại</button>
    </div>
</body>
</html>
